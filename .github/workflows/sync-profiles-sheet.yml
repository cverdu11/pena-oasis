name: Sync profiles to Google Sheets

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      SUPABASE_FUNCTION_URL: ${{ secrets.SUPABASE_FUNCTION_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      PROFILES_SYNC_SECRET: ${{ secrets.PROFILES_SYNC_SECRET }}
    steps:
      - name: Validate required secrets
        if: ${{ env.SUPABASE_FUNCTION_URL == '' || env.PROFILES_SYNC_SECRET == '' }}
        run: |
          echo "Missing required secrets. Configure SUPABASE_FUNCTION_URL and PROFILES_SYNC_SECRET to enable the manual sync."
          exit 1

      - name: Trigger profiles sync
        if: ${{ env.SUPABASE_FUNCTION_URL != '' && env.PROFILES_SYNC_SECRET != '' }}
        run: |
          if [ -n "$SUPABASE_ANON_KEY" ]; then
            curl --fail-with-body --request POST "$SUPABASE_FUNCTION_URL" \
              --header "Authorization: Bearer $SUPABASE_ANON_KEY" \
              --header "apikey: $SUPABASE_ANON_KEY" \
              --header "x-sync-secret: $PROFILES_SYNC_SECRET"
          else
            curl --fail-with-body --request POST "$SUPABASE_FUNCTION_URL" \
              --header "x-sync-secret: $PROFILES_SYNC_SECRET"
          fi
